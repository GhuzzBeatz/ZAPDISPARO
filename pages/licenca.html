<!DOCTYPE html>
<html lang="pt-BR" data-tema="dark">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../css/style.css">
<script src="../js/licenca.js"></script><script src="../js/util.js"></script></head>
<body>
<div class="lic-body">
  <div class="lic-box">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:28px">
      <div style="width:54px;height:54px;background:linear-gradient(135deg,#25d366,#128c4a);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 6px 20px rgba(37,211,102,.4)">🚀</div>
      <div>
        <div style="font-size:26px;font-weight:900;color:var(--fg)">Zap<span style="color:#25d366">Disparo</span></div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px">Disparador de Mensagens em Massa para WhatsApp</div>
      </div>
    </div>
    <div style="font-size:14px;font-weight:700;color:var(--fg);margin-bottom:6px">Chave de Licença</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:18px">Formato: <span style="font-family:monospace;color:var(--primary);font-weight:700">ZAPDISP-0000-XXXX-0000</span></div>
    <input class="lic-input" id="inputChave" maxlength="30" placeholder="ZAPDISP-XXXX-XXXX-XXXX" oninput="fmt(this)" onkeydown="if(event.key==='Enter')ativar()">
    <button class="lic-btn" onclick="ativar()">🔑 Ativar Licença</button>
    <div style="background:var(--rbg);border:1px solid rgba(240,82,82,.25);color:var(--red);border-radius:8px;padding:9px 13px;font-size:13px;font-weight:600;margin-top:12px;display:none" id="erro">Chave inválida. Verifique e tente novamente.</div>
    <div style="text-align:center;margin-top:22px;font-size:11px;color:var(--muted)">Suporte: (11) 94898-1459 · GHZPLUGIN@GMAIL.COM</div>
  </div>
</div>
<script>
aplicarTemaAtual()
function fmt(inp){
  let v=inp.value.toUpperCase().replace(/[^A-Z0-9]/g,''),r=''
  if(v.length<=7) r=v
  else if(v.length<=11) r=v.slice(0,7)+'-'+v.slice(7)
  else if(v.length<=15) r=v.slice(0,7)+'-'+v.slice(7,11)+'-'+v.slice(11)
  else r=v.slice(0,7)+'-'+v.slice(7,11)+'-'+v.slice(11,15)+'-'+v.slice(15,19)
  inp.value=r
}
function ativar(){
  const chave=document.getElementById('inputChave').value.trim()
  if(validarChaveZD(chave)){salvarLicencaZD(chave);window.location.replace('../index.html')}
  else{document.getElementById('erro').style.display='block';setTimeout(()=>document.getElementById('erro').style.display='none',4000)}
}
</script>
</body></html>
