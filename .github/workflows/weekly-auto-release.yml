name: Weekly Auto Release V2

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * 1"

permissions:
  contents: write
  actions: read

concurrency:
  group: weekly-auto-release-v2
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Sync with latest default branch
        shell: pwsh
        run: |
          $branch = "${{ github.event.repository.default_branch }}"
          if ([string]::IsNullOrWhiteSpace($branch)) {
            $branch = "main"
          }

          git fetch origin $branch
          git checkout $branch
          git reset --hard "origin/$branch"

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Upgrade WhatsApp engine dependency
        run: npm install whatsapp-web.js@latest

      - name: Bump app version (patch)
        run: npm run ci:bump-version

      - name: Build installer
        run: npm run build -- --publish never

      - name: Resolve build artifacts
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $version = [string]$pkg.version

          $setup = Get-ChildItem dist_installer -File |
            Where-Object { $_.Name -like '*.exe' -and $_.Name -notlike '*.blockmap' } |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $setup) {
            throw 'Setup (.exe) nao encontrado em dist_installer.'
          }

          $staticName = "ZapDisparo.Setup.exe"
          $staticPath = Join-Path $setup.DirectoryName $staticName
          Copy-Item $setup.FullName $staticPath -Force

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SETUP_NAME=$staticName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "SETUP_PATH=$staticPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Commit dependency and version update
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add package.json package-lock.json

          if (-not (git diff --cached --quiet)) {
            git commit -m "chore(release): v$env:APP_VERSION atualiza dependencias [skip ci]"
            git push
          } else {
            Write-Host "Sem mudancas em package.json/package-lock.json"
          }

      - name: Create or update GitHub release
        id: release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.APP_VERSION }}
          name: ZapDisparo ${{ env.APP_VERSION }}
          body: Atualizacao automatica semanal.
          files: |
            ${{ env.SETUP_PATH }}
          overwrite_files: true
          make_latest: true

      - name: Resolve uploaded asset name
        shell: pwsh
        run: |
          $assetsJson = '${{ steps.release.outputs.assets }}'
          $assets = $assetsJson | ConvertFrom-Json
          $asset = $assets | Where-Object { $_.name -like '*.exe' } | Select-Object -First 1

          if (-not $asset -or -not $asset.name) {
            throw 'Nao foi possivel identificar o nome do asset .exe publicado na release.'
          }

          "RELEASE_ASSET_NAME=$($asset.name)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Update update-manifest.json
        run: >
          node scripts/write-update-manifest.js --version "$env:APP_VERSION" --asset "$env:RELEASE_ASSET_NAME" --repo "$env:GITHUB_REPOSITORY" --out "update-manifest.json" --notes "Atualizacao automatica semanal."

      - name: Commit and push updated manifest
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add update-manifest.json

          if (-not (git diff --cached --quiet)) {
            git commit -m "chore(update): manifesto v$env:APP_VERSION [skip ci]"
            git push
          } else {
            Write-Host "Manifesto sem mudancas"
          }

  notify-whatsapp:
    runs-on: ubuntu-latest
    needs: build-release
    if: ${{ always() && needs.build-release.result != 'cancelled' }}
    env:
      WHATSAPP_ALERT_PHONE: "5511948981459"
      WHATSAPP_ALERT_APIKEY: ${{ secrets.WHATSAPP_ALERT_APIKEY }}
      WORKFLOW_RESULT: ${{ needs.build-release.result }}

    steps:
      - name: Skip when WhatsApp API key is not configured
        if: ${{ env.WHATSAPP_ALERT_APIKEY == '' }}
        run: echo "WHATSAPP_ALERT_APIKEY nao configurado. Pulando alerta de WhatsApp."

      - name: Compose WhatsApp alert message
        id: compose
        if: ${{ env.WHATSAPP_ALERT_APIKEY != '' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          run_id = os.environ["GITHUB_RUN_ID"]
          run_number = os.environ["GITHUB_RUN_NUMBER"]
          ref_name = os.environ.get("GITHUB_REF_NAME", "unknown")
          actor = os.environ.get("GITHUB_ACTOR", "github-actions")
          result = os.environ["WORKFLOW_RESULT"]
          run_url = f"https://github.com/{repo}/actions/runs/{run_id}"

          if result == "success":
              text = (
                  "[SUCESSO] ZapDisparo: atualizacao semanal concluida com sucesso.\n"
                  f"Run: #{run_number}\n"
                  f"Branch: {ref_name}\n"
                  f"Autor: {actor}\n"
                  f"Logs: {run_url}"
              )
          else:
              failed_job = "build-release"
              failed_step = "etapa nao identificada"

              try:
                  api_url = f"https://api.github.com/repos/{repo}/actions/runs/{run_id}/jobs?per_page=100"
                  request = urllib.request.Request(
                      api_url,
                      headers={
                          "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                          "Accept": "application/vnd.github+json",
                      },
                  )
                  with urllib.request.urlopen(request, timeout=30) as response:
                      payload = json.loads(response.read().decode("utf-8"))

                  for job in payload.get("jobs", []):
                      if job.get("conclusion") == "failure":
                          failed_job = job.get("name") or failed_job
                          for step in job.get("steps") or []:
                              if step.get("conclusion") == "failure":
                                  failed_step = step.get("name") or failed_step
                                  break
                          break
              except Exception:
                  pass

              text = (
                  "[ERRO] ZapDisparo: falha na atualizacao semanal.\n"
                  f"Run: #{run_number}\n"
                  f"Branch: {ref_name}\n"
                  f"Autor: {actor}\n"
                  f"Job: {failed_job}\n"
                  f"Etapa: {failed_step}\n"
                  f"Logs: {run_url}"
              )

          output_file = os.environ["GITHUB_OUTPUT"]
          with open(output_file, "a", encoding="utf-8") as f:
              f.write("text<<EOF\n")
              f.write(text)
              f.write("\nEOF\n")
          PY

      - name: Send WhatsApp alert
        if: ${{ env.WHATSAPP_ALERT_APIKEY != '' }}
        shell: bash
        env:
          WHATSAPP_TEXT: ${{ steps.compose.outputs.text }}
        run: |
          set -euo pipefail

          curl -fsS -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=${WHATSAPP_ALERT_PHONE}" \
            --data-urlencode "text=${WHATSAPP_TEXT}" \
            --data-urlencode "apikey=${WHATSAPP_ALERT_APIKEY}"
